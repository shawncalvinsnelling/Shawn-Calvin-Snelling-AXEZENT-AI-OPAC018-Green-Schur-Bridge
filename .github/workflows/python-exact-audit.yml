name: Pure Python Exact Audit

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pure-python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run pure-Python exact audit
        run: python pure_python_exact_audit.py
      - name: Verify SHA-256 manifest after deterministic audit
        run: python verify_manifest.py
