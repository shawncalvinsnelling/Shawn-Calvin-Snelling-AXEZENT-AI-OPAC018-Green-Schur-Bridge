name: Manifest Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify SHA-256 manifest
        run: python verify_manifest.py
